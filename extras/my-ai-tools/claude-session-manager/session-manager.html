<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Session Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --col-title:   minmax(180px, 1.1fr);
      --col-path:    minmax(200px, 1.0fr);
      --col-first:   minmax(240px, 1.3fr);
      --col-last:    minmax(240px, 1.3fr);
      --col-meta:    minmax(110px, .6fr);
      --col-action:  108px;
      --table-columns: var(--col-title) var(--col-path) var(--col-first) var(--col-last) var(--col-meta) var(--col-action);

      /* Dark palette */
      --bg-base:          #0c0c0e;
      --bg-panel:         #111114;
      --bg-row-hover:     #17171b;
      --bg-row-selected:  #18160f;
      --bg-panel-inset:   #0f0f12;
      --bg-chip:          #1c1c20;
      --bg-input:         #151518;
      --bg-danger-dim:    rgba(239,68,68,.08);
      --bg-accent-dim:    rgba(217,119,6,.1);

      --text-primary:   #e2e2e5;
      --text-secondary: #7e7e88;
      --text-muted:     #47474f;
      --text-mono:      #b8985a;       /* warm amber for paths */

      --accent:         #d97706;
      --accent-bright:  #f59e0b;
      --accent-glow:    rgba(217,119,6,.18);

      --border-base:    #222228;
      --border-subtle:  #1a1a1e;
      --border-accent:  rgba(217,119,6,.35);

      --danger:         #e05252;
      --danger-soft:    rgba(224,82,82,.12);

      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;

      --font-ui:   'DM Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', 'Cascadia Code', 'Fira Code', monospace;

      --text-xs:   0.72rem;
      --text-sm:   0.84rem;
      --text-base: 0.94rem;
      --text-md:   1.02rem;

      --ease-out: cubic-bezier(.22,.68,0,1);
      --dur-fast: 120ms;
      --dur-base: 200ms;
    }

    /* ─── Light mode overrides ─────────────────── */
    html[data-theme="light"] {
      color-scheme: light;
      --bg-base:          #f5f4f1;
      --bg-panel:         #ffffff;
      --bg-row-hover:     #f0efec;
      --bg-row-selected:  #fdf8f0;
      --bg-panel-inset:   #f0eff0;
      --bg-chip:          #ececec;
      --bg-input:         #fafaf9;
      --bg-danger-dim:    rgba(220,38,38,.06);
      --bg-accent-dim:    rgba(217,119,6,.08);

      --text-primary:   #18181b;
      --text-secondary: #52525b;
      --text-muted:     #a1a1aa;
      --text-mono:      #92620a;

      --accent:         #d97706;
      --accent-bright:  #b45309;
      --accent-glow:    rgba(217,119,6,.15);

      --border-base:    #e4e4e7;
      --border-subtle:  #f0f0f2;
      --border-accent:  rgba(217,119,6,.3);

      --danger:         #dc2626;
      --danger-soft:    rgba(220,38,38,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    html[data-theme="light"] { color-scheme: light; }

    body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-base);
      line-height: 1.5;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Layout shell ──────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;   /* dvh accounts for mobile browser chrome */
      overflow: hidden;
    }

    /* ─── Topbar ────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 1.25rem;
      height: 48px;
      border-bottom: 1px solid var(--border-base);
      background: var(--bg-panel);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      min-width: 0;
    }

    .app-icon {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      background: linear-gradient(135deg, var(--accent) 0%, #92400e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .app-icon svg { width: 13px; height: 13px; fill: #fff; }

    .app-title {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -.01em;
      white-space: nowrap;
    }

    .topbar-sep {
      width: 1px;
      height: 18px;
      background: var(--border-base);
      flex-shrink: 0;
    }

    .stat-pills {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.55rem;
      border-radius: var(--radius-sm);
      background: var(--bg-chip);
      border: 1px solid var(--border-base);
      font-size: var(--text-xs);
      color: var(--text-secondary);
      font-family: var(--font-ui);
    }
    .stat-pill strong {
      color: var(--text-primary);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot[data-ready="true"] { background: #3d9e60; }
    .status-dot[data-error="true"] { background: var(--danger); }

    .timestamp {
      font-size: var(--text-xs);
      color: var(--text-muted);
      font-family: var(--font-mono);
      letter-spacing: 0;
    }

    /* ─── Buttons ───────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.65rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-base);
      background: var(--bg-chip);
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: color var(--dur-fast), border-color var(--dur-fast), background var(--dur-fast);
      white-space: nowrap;
    }
    .btn:hover { color: var(--text-primary); border-color: #383840; background: #1e1e23; }
    .btn:focus-visible { outline: 1.5px solid var(--accent); outline-offset: 2px; }
    .btn[disabled] { opacity: .4; cursor: not-allowed; }

    .btn-icon { padding: 0.3rem 0.4rem; }
    .btn-icon svg { width: 14px; height: 14px; stroke: currentColor; }

    /* ─── Lang toggle ───────────────────────────── */
    .lang-toggle {
      display: inline-flex;
      padding: 2px;
      border-radius: var(--radius-sm);
      background: var(--bg-panel-inset);
      border: 1px solid var(--border-base);
      gap: 1px;
    }
    .lang-toggle button {
      padding: 0.18rem 0.5rem;
      font-size: var(--text-xs);
      font-weight: 500;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      font-family: var(--font-ui);
      transition: color var(--dur-fast), background var(--dur-fast);
    }
    .lang-toggle button:hover { color: var(--text-primary); }
    .lang-toggle button[data-active="true"] {
      background: var(--accent);
      color: #fff;
    }
    .lang-toggle button:focus-visible { outline: 1.5px solid var(--accent); outline-offset: 2px; }

    /* ─── Content area ──────────────────────────── */
    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      overflow: hidden;
    }

    /* ─── Toolbar ───────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid var(--border-base);
      background: var(--bg-panel);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar-left { display: flex; align-items: center; gap: 0.5rem; flex: 1 1 300px; min-width: 0; }
    .toolbar-right { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }

    /* Search */
    .search-wrap {
      position: relative;
      flex: 1 1 280px;
      max-width: 520px;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      width: 13px;
      height: 13px;
      stroke: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap input {
      width: 100%;
      padding: 0.32rem 0.75rem 0.32rem 2rem;
      border: 1px solid var(--border-base);
      border-radius: var(--radius-sm);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color var(--dur-fast), box-shadow var(--dur-fast);
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      border-color: var(--border-accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Sort chips */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .sort-label {
      font-size: var(--text-xs);
      color: var(--text-muted);
      margin-right: 0.15rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .sort-chip {
      padding: 0.22rem 0.55rem;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-secondary);
      font-family: var(--font-ui);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: color var(--dur-fast), background var(--dur-fast), border-color var(--dur-fast);
    }
    .sort-chip:hover { color: var(--text-primary); background: var(--bg-chip); }
    .sort-chip[data-active="true"] {
      color: var(--accent-bright);
      background: var(--bg-accent-dim);
      border-color: var(--border-accent);
    }
    .sort-chip:focus-visible { outline: 1.5px solid var(--accent); outline-offset: 2px; }

    /* ─── Table area ────────────────────────────── */
    .panel-frame {
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .panel-scroll {
      height: 100%;
      overflow: auto;
      overscroll-behavior: contain;
    }

    /* Thin custom scrollbar */
    .panel-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .panel-scroll::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }
    .panel-scroll::-webkit-scrollbar-thumb:hover { background: #38383e; }

    .sessions-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      table-layout: fixed;
    }

    /* Sticky header */
    .sessions-table thead {
      position: sticky;
      top: 0;
      z-index: 3;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border-base);
    }
    .sessions-table th {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border-base);
      padding: 0;
      vertical-align: bottom;
    }

    .table-head-grid,
    .session-row {
      display: grid;
      grid-template-columns: var(--table-columns);
      gap: 0;
    }

    .table-head-grid {
      padding: 0.55rem 1.25rem;
      align-items: end;
      gap: 1px; /* visual separator */
    }

    .head-cell {
      min-width: 0;
      display: flex;
      align-items: center;
      padding: 0 0.5rem;
    }
    .head-cell:first-child { padding-left: 0; }
    .head-cell:last-child { justify-content: flex-end; padding-right: 0; }

    .sessions-table th button {
      all: unset;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: var(--text-muted);
      font-size: var(--text-xs);
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      transition: color var(--dur-fast);
      min-width: 0;
    }
    .sessions-table th button:hover { color: var(--text-secondary); }

    .sessions-table td { padding: 0; vertical-align: top; border-bottom: 1px solid var(--border-subtle); }

    /* ─── Session rows ──────────────────────────── */
    .session-row {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 0.48rem 1.25rem;
      align-items: start;
      color: inherit;
      cursor: pointer;
      transition: background var(--dur-fast);
      position: relative;
    }
    .session-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--accent);
      opacity: 0;
      transition: opacity var(--dur-fast);
    }
    .session-row:hover { background: var(--bg-row-hover); }
    .session-row[data-selected="true"] {
      background: var(--bg-row-selected);
    }
    .session-row[data-selected="true"]::before { opacity: 1; }
    .session-row:focus-visible { outline: none; box-shadow: inset 0 0 0 1.5px var(--accent); }

    /* ─── Cell internals ────────────────────────── */
    .cell { min-width: 0; padding: 0 0.5rem; }
    .cell:first-child { padding-left: 0; }
    .cell:last-child { padding-right: 0; }

    .cell-label {
      display: none;
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      margin-bottom: 0.2rem;
    }

    /* Title cell */
    .title-stack { display: flex; flex-direction: column; gap: 0.22rem; padding-top: 0.06rem; }
    .session-title-text {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      line-height: 1.3;
    }
    .title-badge {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 500;
      font-family: var(--font-mono);
      padding: 0.05rem 0.35rem;
      border-radius: 3px;
      letter-spacing: .02em;
      line-height: 1.6;
      width: fit-content;
    }
    .title-badge.explicit {
      background: rgba(61,158,96,.12);
      color: #5fba82;
      border: 1px solid rgba(61,158,96,.2);
    }
    .title-badge.derived {
      background: var(--bg-chip);
      color: var(--text-muted);
      border: 1px solid var(--border-base);
    }

    /* Path cell */
    .path-stack { padding-top: 0.1rem; }
    .path-text {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-mono);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: rtl;
      text-align: left;
      opacity: 0.85;
    }

    /* Prompt cell */
    .prompt-stack { padding-top: 0.08rem; }
    .prompt-text {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Meta cell */
    .meta-stack {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      padding-top: 0.08rem;
    }
    .length-badge {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent-bright);
      background: var(--bg-accent-dim);
      border: 1px solid var(--border-accent);
      padding: 0.12rem 0.4rem;
      border-radius: 4px;
      letter-spacing: .01em;
    }
    .size-text {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
    }
    .rel-time {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--text-muted);
    }

    /* Action cell */
    .action-stack {
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      padding-top: 0.06rem;
    }

    .inline-delete {
      font-size: 0.72rem;
      padding: 0.24rem 0.55rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-base);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-ui);
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: color var(--dur-fast), border-color var(--dur-fast), background var(--dur-fast);
    }
    .inline-delete:hover {
      color: var(--danger);
      border-color: rgba(224,82,82,.3);
      background: var(--danger-soft);
    }
    .inline-delete[data-armed="true"] {
      color: #fff;
      background: var(--danger);
      border-color: var(--danger);
    }
    .inline-delete[data-armed="true"]:hover {
      background: #cc3a3a;
      border-color: #cc3a3a;
    }
    .inline-delete:focus-visible { outline: 1.5px solid var(--danger); outline-offset: 2px; }

    /* ─── State overlays ────────────────────────── */
    .state-layer {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 2rem;
      background: var(--bg-panel-inset);
      z-index: 4;
    }
    .state-layer[data-visible="true"] { display: grid; }

    .state-card {
      width: min(480px, 100%);
      border: 1px solid var(--border-base);
      border-radius: var(--radius-lg);
      padding: 2rem;
      display: grid;
      gap: 0.75rem;
      text-align: center;
      background: var(--bg-panel);
    }
    .state-title {
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--text-primary);
    }
    .state-copy {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto;
      border-radius: 50%;
      border: 2px solid var(--border-base);
      border-top-color: var(--accent);
      animation: spin 700ms linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Drawer backdrop ───────────────────────── */
    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-base) var(--ease-out);
      z-index: 8;
    }
    .backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }

    /* ─── Drawer ────────────────────────────────── */
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(600px, 46vw);
      z-index: 9;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-base);
      transform: translateX(100%);
      transition: transform var(--dur-base) var(--ease-out);
      overflow: hidden;
    }
    .drawer[data-open="true"] { transform: translateX(0); }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 1rem 1.25rem 0.85rem;
      border-bottom: 1px solid var(--border-base);
      flex-shrink: 0;
      background: var(--bg-panel);
    }

    .drawer-meta { min-width: 0; flex: 1; }
    .drawer-eyebrow {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .drawer-title {
      font-size: var(--text-md);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.3;
      word-break: break-word;
    }
    .drawer-subtitle {
      margin-top: 0.4rem;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-mono);
      word-break: break-all;
      opacity: 0.9;
    }

    .drawer-body {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .drawer-body::-webkit-scrollbar { width: 5px; }
    .drawer-body::-webkit-scrollbar-track { background: transparent; }
    .drawer-body::-webkit-scrollbar-thumb { background: #252529; border-radius: 3px; }

    /* Metrics grid inside drawer */
    .drawer-metrics {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      border-bottom: 1px solid var(--border-base);
      background: var(--border-base); /* gap color */
    }
    .metric-cell {
      padding: 0.8rem 1.25rem;
      background: var(--bg-panel);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .metric-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      font-weight: 500;
    }
    .metric-value {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--text-primary);
      font-weight: 500;
      word-break: break-word;
    }

    /* Drawer content sections */
    .drawer-scroll { display: flex; flex-direction: column; gap: 0; }
    .md-section {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .md-section h3 {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 0.55rem;
    }
    .md-block {
      color: var(--text-secondary);
      font-size: var(--text-sm);
      line-height: 1.6;
      display: grid;
      gap: 0.6rem;
      word-break: break-word;
    }
    .md-block p { color: var(--text-secondary); }
    .md-block h1, .md-block h2, .md-block h3 {
      color: var(--text-primary);
      font-weight: 600;
      line-height: 1.3;
    }
    .md-block h1 { font-size: var(--text-md); }
    .md-block h2 { font-size: var(--text-base); }
    .md-block h3 { font-size: var(--text-sm); }
    .md-block ul { padding-left: 1.1rem; display: grid; gap: 0.3rem; }
    .md-block code {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      background: var(--bg-chip);
      border: 1px solid var(--border-base);
      border-radius: 4px;
      padding: 0.08rem 0.3rem;
      color: var(--text-mono);
    }
    .md-block pre {
      overflow: auto;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      background: var(--bg-panel-inset);
      border: 1px solid var(--border-base);
    }
    .md-block pre code { background: transparent; border: none; padding: 0; color: var(--text-secondary); }

    /* Placeholder */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 2.5rem 1.5rem;
      text-align: center;
    }
    .placeholder-title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--text-secondary);
    }
    .placeholder-copy {
      font-size: var(--text-sm);
      color: var(--text-muted);
      max-width: 28ch;
      line-height: 1.55;
    }

    /* ─── Utility ───────────────────────────────── */
    .visually-hidden {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    /* ─── Responsive ────────────────────────────── */
    @media (max-width: 1100px) {
      :root {
        --col-first: minmax(200px, 1.2fr);
        --col-last:  minmax(200px, 1.2fr);
      }
      .drawer { width: min(90vw, 680px); }
      .stat-pills { display: none; }
    }

    @media (max-width: 860px) {
      :root { --table-columns: 1fr; }
      .sessions-table thead { display: none; }
      .sessions-table, .sessions-table tbody, .sessions-table tr, .sessions-table td { display: block; width: 100%; }
      .session-row { grid-template-columns: 1fr; gap: 0.35rem; padding: 0.75rem 1rem; }
      .cell { padding: 0; }
      .cell-label { display: block; }
      .action-stack { justify-content: flex-start; }
      .drawer { width: auto; left: 0; border-left: none; border-top: 1px solid var(--border-base); top: auto; height: 75vh; transform: translateY(100%); }
      .drawer[data-open="true"] { transform: translateY(0); }
      .drawer-metrics { grid-template-columns: 1fr 1fr; }
      .sort-bar { display: none; }
      .topbar { height: auto; padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>
  <div class="backdrop" id="drawerBackdrop" data-open="false"></div>

  <main class="shell" id="appShell" aria-label="Claude Code session dashboard">

          <div class="stat-pill"><span id="statProjectsLabel"></span>&nbsp;<strong id="statProjects">—</strong></div>

          <svg id="themeIconSun"  viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

    </header>

    <!-- ── Content ── -->
    <div class="content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <label class="search-wrap" for="searchInput">

      <!-- Table panel -->
      <div class="panel-frame" aria-live="polite" id="workspaceSection">
        <div class="panel-scroll">
          <table class="sessions-table" aria-describedby="tableSummary">

            <thead>
              <tr>

  <!-- ── Inspector Drawer ── -->
  <aside class="drawer" id="drawer" data-open="false" aria-label="Session inspector">
    <div class="drawer-header">
      <div class="drawer-meta">

        </div>
        <div class="metric-cell">

      <div class="drawer-scroll" id="drawerScroll">

  </aside>

  <script>
    (() => {
      const I18N = {

        },
        en: {

          shellAria: 'Claude Code session dashboard',
          workspaceAria: 'Session table',
          languageToggleAria: 'Language toggle',
          sortBarAria: 'Sort controls',
          drawerAria: 'Session inspector',
          tableSummary: 'Searchable and sortable session table',
          searchLabel: 'Search sessions',
          eyebrow: 'Local session browser',
          title: 'Claude Code Session Manager',
          subtitle: 'Browse local .claude session history with search, deletion, and a collapsible right-side inspector.',
          statVisible: 'Visible',
          statProjects: 'Projects',
          statLongest: 'Longest',
          searchPlaceholder: 'Search title, project path, first/last prompt, or session id',
          refresh: 'Refresh',
          toggleInspector: 'Inspector',
          sortLabel: 'Sort:',
          sortRecent: 'Recent',
          sortTitle: 'Title',
          sortProject: 'Project',
          sortLength: 'Length',
          thTitle: 'Title',
          thProject: 'Project path',
          thFirst: 'First prompt',
          thLast: 'Last prompt',
          thLength: 'Length',
          thActions: 'Actions',
          loadingTitle: 'Loading sessions',
          loadingCopy: 'Fetching the local session registry from /api/sessions.',
          errorTitle: 'The session registry could not be loaded',

          emptyNone: 'No sessions found',
          emptyNoneCopy: 'There are no local session records available to display yet.',
          emptySearch: 'No matching sessions',
          emptySearchCopy: 'Try a broader query or clear the search field.',
          statusLoading: 'Loading',
          statusError: 'Unavailable',
          statusReady: 'Updated',
          drawerEyebrow: 'Inspector',
          closeDrawer: 'Close',
          noSelection: 'No session selected',
          noSelectionCopy: 'Select any row to open a reduced inspector with project path, prompt boundaries, size, and timestamps.',
          metricLength: 'Length (entries)',
          metricStorage: 'Storage size',
          metricCreated: 'Created',
          metricUpdated: 'Updated',
          projectPath: 'Project path',
          firstPrompt: 'First prompt',
          lastPrompt: 'Last prompt',
          subagents: 'Subagents / sidechains',
          subagentSummary: '{count} subagent files, {entries}, last updated {updated}, using {size}.',
          delete: 'Delete',

          deleteFailed: 'Delete failed',
          deleteSucceeded: 'Session deleted',

          lengthSuffixOne: 'entry',
          lengthSuffixMany: 'entries',
          bytes: 'bytes',
          unknown: 'Unknown',
          unavailable: 'Unavailable'
        }
      };

      const state = {
        sessions: [],
        filteredSessions: [],
        searchQuery: '',
        sortKey: 'updatedAt',
        sortDirection: 'desc',
        selectedSessionId: null,
        drawerOpen: false,
        loading: true,
        deletingSessionId: null,
        armedDeleteSessionId: null,
        error: '',
        lastFetchedAt: null,
        lang: (() => { try { return localStorage.getItem('csm-lang') || 'zh'; } catch (_) { return 'zh'; } })()
      };

      const els = {
        eyebrowLabel: document.getElementById('eyebrowLabel'),
        appTitle: document.getElementById('appTitle'),
        subtitleText: document.getElementById('subtitleText'),
        statVisibleLabel: document.getElementById('statVisibleLabel'),
        statProjectsLabel: document.getElementById('statProjectsLabel'),
        statLongestLabel: document.getElementById('statLongestLabel'),

        drawerBackdrop: document.getElementById('drawerBackdrop'),
        drawer: document.getElementById('drawer'),

        drawerTitle: document.getElementById('drawerTitle'),
        drawerSubtitle: document.getElementById('drawerSubtitle'),
        closeDrawerButton: document.getElementById('closeDrawerButton'),

        metricStorageLabel: document.getElementById('metricStorageLabel'),
        metricCreatedLabel: document.getElementById('metricCreatedLabel'),
        metricUpdatedLabel: document.getElementById('metricUpdatedLabel'),
        metricLengthValue: document.getElementById('metricLengthValue'),
        metricStorageValue: document.getElementById('metricStorageValue'),
        metricCreatedValue: document.getElementById('metricCreatedValue'),
        metricUpdatedValue: document.getElementById('metricUpdatedValue'),
        drawerScroll: document.getElementById('drawerScroll'),
        drawerPlaceholder: document.getElementById('drawerPlaceholder'),
        placeholderTitle: document.getElementById('placeholderTitle'),
        placeholderCopy: document.getElementById('placeholderCopy'),
        statusDot: document.getElementById('statusDot')
      };

      function t(key) {
        return I18N[state.lang][key] || key;
      }

      function ariaLabelForSort(key) {
        const labelMap = {
          title: t('thTitle'),
          projectPath: t('thProject'),
          firstPrompt: t('thFirst'),
          lastPrompt: t('thLast'),
          overallLength: t('thLength')
        };
        return labelMap[key] || key;
      }

      function safeText(value, fallback = '') {
        if (typeof value === 'string' && value.trim()) return value.trim();
        if (typeof value === 'number' && Number.isFinite(value)) return String(value);
        return fallback;
      }

      function parseDate(value) {
        if (!value) return null;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function formatDate(value) {
        const date = parseDate(value);
        if (!date) return t('unknown');
        return new Intl.DateTimeFormat(state.lang === 'zh' ? 'zh-CN' : 'en-US', {
          year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
        }).format(date);
      }

      function formatRelative(value) {
        const date = parseDate(value);
        if (!date) return t('unknown');
        const diffMs = date.getTime() - Date.now();
        const minutes = Math.round(diffMs / 60000);
        const locale = state.lang === 'zh' ? 'zh-CN' : 'en-US';
        const rtf = new Intl.RelativeTimeFormat(locale, { numeric: 'auto' });
        if (Math.abs(minutes) < 60) return rtf.format(minutes, 'minute');
        const hours = Math.round(minutes / 60);
        if (Math.abs(hours) < 48) return rtf.format(hours, 'hour');
        const days = Math.round(hours / 24);
        return rtf.format(days, 'day');
      }

      function overallLength(session) {
        if (Number.isFinite(session.entryCount)) return session.entryCount;
        const total = (Number.isFinite(session.userMessageCount) ? session.userMessageCount : 0) +
          (Number.isFinite(session.assistantMessageCount) ? session.assistantMessageCount : 0);
        return total || 0;
      }

      function formatLength(value) {
        if (!Number.isFinite(value) || value <= 0) return state.lang === 'zh' ? '0 条' : '0 entries';
        if (state.lang === 'zh') return value.toLocaleString('zh-CN') + ' 条';
        return value === 1 ? '1 entry' : value.toLocaleString('en-US') + ' entries';
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return t('unavailable');
        const units = ['B', 'KB', 'MB', 'GB'];
        let value = bytes;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }
        const display = value >= 10 || unitIndex === 0 ? Math.round(value) : value.toFixed(1);
        return display + ' ' + units[unitIndex];
      }

      function normalizedTitleSource(value) {
        const source = typeof value === 'string' ? value.trim().toLowerCase() : '';
        if (!source) return 'derived';
        if (source.includes('explicit') || source.includes('manual') || source.includes('user') || source.includes('ai-title')) return 'explicit';
        return 'derived';
      }

      function normalizeSession(raw, index) {
        const title = safeText(raw && raw.title, t('untitledSession'));
        const firstPrompt = safeText(raw && raw.firstPrompt, '');
        const lastPrompt = safeText(raw && raw.lastPrompt, '');
        const projectPath = safeText(raw && raw.projectPath, '');
        const sessionId = safeText(raw && raw.sessionId, t('sessionPrefix') + '-' + index);
        const titleKind = normalizedTitleSource(raw && raw.titleSource);
        const computedLength = overallLength(raw || {});
        const startedAt = raw && raw.startedAt ? raw.startedAt : null;
        const updatedAt = raw && raw.updatedAt ? raw.updatedAt : startedAt;
        const storageBytes = Number.isFinite(raw && raw.storageBytes) ? raw.storageBytes : null;
        const subagentCount = Number.isFinite(raw && raw.subagentCount) ? raw.subagentCount : 0;
        const subagentEntryCount = Number.isFinite(raw && raw.subagentEntryCount) ? raw.subagentEntryCount : 0;
        const subagentStorageBytes = Number.isFinite(raw && raw.subagentStorageBytes) ? raw.subagentStorageBytes : 0;
        const subagentUpdatedAt = raw && raw.subagentUpdatedAt ? String(raw.subagentUpdatedAt) : null;

        return {
          raw: raw || {},
          sessionId,
          title,
          titleSource: raw && raw.titleSource ? String(raw.titleSource) : '',
          titleKind,
          projectPath,
          firstPrompt,
          lastPrompt,
          entryCount: Number.isFinite(raw && raw.entryCount) ? raw.entryCount : null,
          userMessageCount: Number.isFinite(raw && raw.userMessageCount) ? raw.userMessageCount : null,
          assistantMessageCount: Number.isFinite(raw && raw.assistantMessageCount) ? raw.assistantMessageCount : null,
          startedAt,
          updatedAt,
          sourcePath: raw && raw.sourcePath ? String(raw.sourcePath) : '',
          storageBytes,
          subagentCount,
          subagentEntryCount,
          subagentStorageBytes,
          subagentUpdatedAt,
          overallLength: computedLength,
          searchable: [title, projectPath, firstPrompt, lastPrompt, sessionId].filter(Boolean).join(' ').toLowerCase(),
          sortDate: parseDate(updatedAt)?.getTime() || parseDate(startedAt)?.getTime() || 0
        };
      }

      function interpolate(template, values) {
        return String(template).replace(/\{(\w+)\}/g, (_, key) => key in values ? String(values[key]) : '');
      }

      function compareText(a, b) {
        return a.localeCompare(b, state.lang === 'zh' ? 'zh-CN' : 'en-US', { sensitivity: 'base', numeric: true });
      }

      function sortSessions(sessions) {
        const multiplier = state.sortDirection === 'asc' ? 1 : -1;
        const key = state.sortKey;
        return [...sessions].sort((left, right) => {
          if (key === 'overallLength') {
            return (left.overallLength - right.overallLength) * multiplier || compareText(left.title, right.title);
          }
          if (key === 'updatedAt') {
            return (left.sortDate - right.sortDate) * multiplier || compareText(left.title, right.title);
          }
          return compareText(safeText(left[key], ''), safeText(right[key], '')) * multiplier || (left.sortDate - right.sortDate) * -1;
        });
      }

      function applyFilters() {
        const query = state.searchQuery.trim().toLowerCase();
        const base = query ? state.sessions.filter((session) => session.searchable.includes(query)) : state.sessions.slice();
        state.filteredSessions = sortSessions(base);
        if (!state.filteredSessions.some((session) => session.sessionId === state.selectedSessionId)) {
          state.selectedSessionId = state.filteredSessions[0] ? state.filteredSessions[0].sessionId : null;
        }
      }

      function renderHeader() {
        document.documentElement.lang = I18N[state.lang].htmlLang;
        els.appShell.setAttribute('aria-label', t('shellAria'));
        els.workspaceSection.setAttribute('aria-label', t('workspaceAria'));
        els.langToggle.setAttribute('aria-label', t('languageToggleAria'));
        els.sortBar.setAttribute('aria-label', t('sortBarAria'));
        els.drawer.setAttribute('aria-label', t('drawerAria'));
        els.tableSummary.textContent = t('tableSummary');
        els.eyebrowLabel.textContent = t('eyebrow');
        els.appTitle.textContent = t('title');
        els.subtitleText.textContent = t('subtitle');
        els.statVisibleLabel.textContent = t('statVisible');
        els.statProjectsLabel.textContent = t('statProjects');
        els.statLongestLabel.textContent = t('statLongest');
        els.searchInput.placeholder = t('searchPlaceholder');
        els.refreshButton.textContent = t('refresh');
        els.toggleInspectorButton.textContent = t('toggleInspector');
        els.sortLabel.textContent = t('sortLabel');
        els.sortChips.forEach((chip) => {
          const key = chip.getAttribute('data-sort-chip');
          chip.dataset.baseLabel = key === 'updatedAt' ? t('sortRecent') : key === 'title' ? t('sortTitle') : key === 'projectPath' ? t('sortProject') : t('sortLength');
        });
        els.thTitle.dataset.baseLabel = t('thTitle');
        els.thProject.dataset.baseLabel = t('thProject');
        els.thFirst.dataset.baseLabel = t('thFirst');
        els.thLast.dataset.baseLabel = t('thLast');
        els.thLength.dataset.baseLabel = t('thLength');
        els.thActions.textContent = t('thActions');
        els.loadingTitle.textContent = t('loadingTitle');
        els.loadingCopy.textContent = t('loadingCopy');
        els.errorTitle.textContent = t('errorTitle');
        els.retryButton.textContent = t('retry');
        els.drawerEyebrow.textContent = t('drawerEyebrow');
        els.closeDrawerButton.textContent = t('closeDrawer');
        els.metricLengthLabel.textContent = t('metricLength');
        els.metricStorageLabel.textContent = t('metricStorage');
        els.metricCreatedLabel.textContent = t('metricCreated');
        els.metricUpdatedLabel.textContent = t('metricUpdated');
        els.placeholderTitle.textContent = t('noSelection');
        els.placeholderCopy.textContent = t('noSelectionCopy');
        els.langZh.dataset.active = state.lang === 'zh' ? 'true' : 'false';
        els.langEn.dataset.active = state.lang === 'en' ? 'true' : 'false';
      }

      function renderStats() {
        const visible = state.filteredSessions.length;
        const projects = new Set(state.filteredSessions.map((session) => session.projectPath)).size;
        const longest = state.filteredSessions.reduce((max, session) => Math.max(max, session.overallLength), 0);
        els.statVisible.textContent = state.loading ? '—' : visible.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US');
        els.statProjects.textContent = state.loading ? '—' : projects.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US');
        els.statLongest.textContent = state.loading ? '—' : formatLength(longest);
        if (state.loading) {
          els.statusSummary.textContent = t('statusLoading');
          els.lastUpdatedLabel.textContent = '—';
          els.statusDot.dataset.ready = 'false';
          els.statusDot.dataset.error = 'false';
        } else if (state.error) {
          els.statusSummary.textContent = t('statusError');
          els.lastUpdatedLabel.textContent = '—';
          els.statusDot.dataset.ready = 'false';
          els.statusDot.dataset.error = 'true';
        } else {
          els.statusSummary.textContent = t('statusReady');
          els.lastUpdatedLabel.textContent = state.lastFetchedAt ? formatDate(state.lastFetchedAt) : '—';
          els.statusDot.dataset.ready = 'true';
          els.statusDot.dataset.error = 'false';
        }
      }

      function renderSortState() {
        els.sortButtons.forEach((button) => {
          const key = button.getAttribute('data-sort-key');
          const active = key === state.sortKey;
          const headerCell = button.closest('.head-cell');
          if (headerCell) headerCell.setAttribute('aria-sort', active ? (state.sortDirection === 'asc' ? 'ascending' : 'descending') : 'none');
          const baseLabel = button.dataset.baseLabel || button.textContent.replace(/\s[↑↓]$/, '');
          button.textContent = baseLabel + (active ? (state.sortDirection === 'asc' ? ' ↑' : ' ↓') : '');
          button.setAttribute('aria-label', ariaLabelForSort(key));
        });
        els.sortChips.forEach((chip) => {
          const active = chip.getAttribute('data-sort-chip') === state.sortKey;
          chip.dataset.active = active ? 'true' : 'false';
          chip.textContent = (chip.dataset.baseLabel || '') + (active ? (state.sortDirection === 'asc' ? ' ↑' : ' ↓') : '');
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderInlineMarkdown(text) {
        return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
      }

      function renderMarkdown(text) {
        const source = safeText(text, '');
        if (!source) return '<p>' + escapeHtml(t('unavailable')) + '</p>';
        const lines = source.replace(/\r\n/g, '\n').split('\n');
        const blocks = [];
        let paragraph = [];
        let listItems = [];
        let codeFence = false;
        let codeLines = [];

        function flushParagraph() {
          if (!paragraph.length) return;
          blocks.push('<p>' + renderInlineMarkdown(paragraph.join('<br>')) + '</p>');
          paragraph = [];
        }
        function flushList() {
          if (!listItems.length) return;
          blocks.push('<ul>' + listItems.map((item) => '<li>' + renderInlineMarkdown(item) + '</li>').join('') + '</ul>');
          listItems = [];
        }
        function flushCode() {
          if (!codeLines.length) return;
          blocks.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
          codeLines = [];
        }

        for (const rawLine of lines) {
          const line = rawLine || '';
          if (line.trim().startsWith('```')) {
            flushParagraph();
            flushList();
            if (codeFence) { flushCode(); codeFence = false; } else { codeFence = true; }
            continue;
          }
          if (codeFence) { codeLines.push(line); continue; }
          const trimmed = line.trim();
          if (!trimmed) { flushParagraph(); flushList(); continue; }
          const heading = /^(#{1,3})\s+(.*)$/.exec(trimmed);
          if (heading) {
            flushParagraph(); flushList();
            const level = Math.min(heading[1].length, 3);
            blocks.push('<h' + level + '>' + renderInlineMarkdown(heading[2]) + '</h' + level + '>');
            continue;
          }
          const bullet = /^[-*]\s+(.*)$/.exec(trimmed);
          if (bullet) { flushParagraph(); listItems.push(bullet[1]); continue; }
          paragraph.push(trimmed);
        }

        if (codeFence) flushCode();
        flushParagraph();
        flushList();
        return blocks.join('');
      }

      function sectionHtml(title, body) {
        return '<section class="md-section"><h3>' + escapeHtml(title) + '</h3><div class="md-block">' + body + '</div></section>';
      }

      function openDrawer() {
        state.drawerOpen = true;
        els.drawer.dataset.open = 'true';
        els.drawerBackdrop.dataset.open = 'true';
      }

      function closeDrawer() {
        state.drawerOpen = false;
        els.drawer.dataset.open = 'false';
        els.drawerBackdrop.dataset.open = 'false';
      }

      function renderTable() {
        els.sessionsBody.innerHTML = '';
        state.filteredSessions.forEach((session) => {
          const row = document.createElement('tr');
          const cell = document.createElement('td');
          cell.colSpan = 6;

          const rowWrap = document.createElement('div');
          rowWrap.className = 'session-row';
          rowWrap.dataset.selected = session.sessionId === state.selectedSessionId ? 'true' : 'false';
          rowWrap.setAttribute('role', 'button');
          rowWrap.setAttribute('tabindex', '0');
          rowWrap.setAttribute('aria-pressed', session.sessionId === state.selectedSessionId ? 'true' : 'false');
          rowWrap.setAttribute('aria-label', session.title);

          const activateRow = () => {
            state.selectedSessionId = session.sessionId;
            openDrawer();
            render();
          };

          rowWrap.addEventListener('click', activateRow);
          rowWrap.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              activateRow();
            }
          });

          const deleteArmed = state.armedDeleteSessionId === session.sessionId;
          const deleteBusy = state.deletingSessionId === session.sessionId;
          const badgeClass = session.titleKind === 'explicit' ? 'explicit' : 'derived';
          const badgeLabel = session.titleKind === 'explicit' ? 'ai' : 'derived';

          rowWrap.innerHTML = `
            <div class="cell">
              <div class="cell-label">${escapeHtml(t('thTitle'))}</div>
              <div class="title-stack">
                <span class="session-title-text" title="${escapeHtml(session.title)}">${escapeHtml(session.title)}</span>
                <span class="title-badge ${badgeClass}">${badgeLabel}</span>
              </div>
            </div>
            <div class="cell">
              <div class="cell-label">${escapeHtml(t('projectPath'))}</div>
              <div class="path-stack">
                <div class="path-text" title="${escapeHtml(session.projectPath)}">${escapeHtml(session.projectPath || t('unknown'))}</div>
              </div>
            </div>
            <div class="cell">
              <div class="cell-label">${escapeHtml(t('firstPrompt'))}</div>
              <div class="prompt-stack">
                <div class="prompt-text" title="${escapeHtml(session.firstPrompt)}">${escapeHtml(session.firstPrompt || t('unavailable'))}</div>
              </div>
            </div>
            <div class="cell">
              <div class="cell-label">${escapeHtml(t('lastPrompt'))}</div>
              <div class="prompt-stack">
                <div class="prompt-text" title="${escapeHtml(session.lastPrompt)}">${escapeHtml(session.lastPrompt || t('unavailable'))}</div>
              </div>
            </div>
            <div class="cell">
              <div class="cell-label">${escapeHtml(t('thLength'))}</div>
              <div class="meta-stack">
                <span class="length-badge">${escapeHtml(formatLength(session.overallLength))}</span>
                <span class="size-text">${escapeHtml(formatBytes(session.storageBytes))}</span>
                <span class="rel-time">${escapeHtml(formatRelative(session.updatedAt))}</span>
              </div>
            </div>
            <div class="cell">
              <div class="cell-label">${escapeHtml(t('thActions'))}</div>
              <div class="action-stack" id="action-${escapeHtml(session.sessionId)}"></div>
            </div>
          `;

          const actionStack = rowWrap.querySelector('.action-stack');

          const deleteButton = document.createElement('button');
          deleteButton.className = 'inline-delete';
          deleteButton.type = 'button';
          deleteButton.dataset.deleteId = session.sessionId;
          deleteButton.dataset.armed = deleteArmed ? 'true' : 'false';
          deleteButton.disabled = deleteBusy;
          deleteButton.textContent = deleteBusy ? '…' : (deleteArmed ? t('deleteArmed') : t('delete'));
          deleteButton.setAttribute('aria-label', deleteArmed ? t('deleteArmed') : t('delete'));
          actionStack.appendChild(deleteButton);

          deleteButton.addEventListener('click', async (event) => {
            event.stopPropagation();
            if (state.deletingSessionId) return;
            if (state.armedDeleteSessionId !== session.sessionId) {
              state.armedDeleteSessionId = session.sessionId;
              render();
              return;
            }
            await deleteSession(session.sessionId);
          });

          cell.appendChild(rowWrap);
          row.appendChild(cell);
          els.sessionsBody.appendChild(row);
        });
      }

      function renderDrawer() {
        const selected = state.sessions.find((session) => session.sessionId === state.selectedSessionId) || null;
        if (!selected) {
          els.drawerTitle.textContent = t('noSelection');
          els.drawerSubtitle.textContent = '';
          els.metricLengthValue.textContent = '—';
          els.metricStorageValue.textContent = '—';
          els.metricCreatedValue.textContent = '—';
          els.metricUpdatedValue.textContent = '—';
          els.drawerScroll.innerHTML = '';
          els.drawerScroll.appendChild(els.drawerPlaceholder);
          return;
        }

        els.drawerTitle.textContent = selected.title;
        els.drawerSubtitle.textContent = selected.projectPath || t('unknown');
        els.metricLengthValue.textContent = formatLength(selected.overallLength);
        els.metricStorageValue.textContent = formatBytes(selected.storageBytes);
        els.metricCreatedValue.textContent = formatDate(selected.startedAt);
        els.metricUpdatedValue.textContent = formatDate(selected.updatedAt);

        const blocks = [
          sectionHtml(t('projectPath'), '<p><code>' + escapeHtml(selected.projectPath || t('unknown')) + '</code></p>'),
          sectionHtml(t('firstPrompt'), renderMarkdown(selected.firstPrompt)),
          selected.lastPrompt && selected.lastPrompt !== selected.firstPrompt
            ? sectionHtml(t('lastPrompt'), renderMarkdown(selected.lastPrompt))
            : ''
        ];

        if (selected.subagentCount > 0) {
          const subagentSummary = interpolate(t('subagentSummary'), {
            count: selected.subagentCount.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US'),
            entries: formatLength(selected.subagentEntryCount),
            updated: formatDate(selected.subagentUpdatedAt),
            size: formatBytes(selected.subagentStorageBytes)
          });
          blocks.push(sectionHtml(t('subagents'), '<p>' + escapeHtml(subagentSummary) + '</p>'));
        }

        els.drawerScroll.innerHTML = blocks.join('');
      }

      function renderStates() {
        els.loadingState.dataset.visible = state.loading ? 'true' : 'false';
        els.errorState.dataset.visible = !state.loading && !!state.error ? 'true' : 'false';
        const emptyReason = !state.loading && !state.error && state.filteredSessions.length === 0;
        els.emptyState.dataset.visible = emptyReason ? 'true' : 'false';
        if (state.error) els.errorMessage.textContent = state.error;
        if (emptyReason) {
          if (state.sessions.length === 0) {
            els.emptyTitle.textContent = t('emptyNone');
            els.emptyMessage.textContent = t('emptyNoneCopy');
          } else {
            els.emptyTitle.textContent = t('emptySearch');
            els.emptyMessage.textContent = t('emptySearchCopy');
          }
        }
        els.refreshButton.disabled = state.loading;
        els.retryButton.disabled = state.loading;
      }

      function render() {
        renderHeader();
        applyFilters();
        renderStats();
        renderSortState();
        renderTable();
        renderDrawer();
        renderStates();
      }

      async function fetchSessions() {
        state.loading = true;
        state.error = '';
        render();
        try {
          const response = await fetch('/api/sessions', { method: 'GET', headers: { Accept: 'application/json' }, cache: 'no-store' });
          if (!response.ok) throw new Error(t('fetchFailedPrefix') + response.status + '.');
          const payload = await response.json();
          const sessionList = Array.isArray(payload) ? payload : (payload && Array.isArray(payload.sessions) ? payload.sessions : null);
          if (!sessionList) throw new Error(t('invalidSessionRegistry'));
          state.sessions = sessionList.map(normalizeSession);
          state.lastFetchedAt = new Date().toISOString();
          if (!state.selectedSessionId && state.sessions.length) state.selectedSessionId = state.sessions[0].sessionId;
        } catch (error) {
          state.error = error instanceof Error ? error.message : t('unknownError');
          state.sessions = [];
        } finally {
          state.loading = false;
          render();
        }
      }

      async function deleteSession(sessionId) {
        state.deletingSessionId = sessionId;
        render();
        try {
          const response = await fetch('/api/sessions/' + encodeURIComponent(sessionId), { method: 'DELETE', headers: { Accept: 'application/json' } });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error((payload && payload.error) || t('deleteFailed'));
          }
          state.sessions = state.sessions.filter((session) => session.sessionId !== sessionId);
          state.armedDeleteSessionId = null;
          if (state.selectedSessionId === sessionId) {
            state.selectedSessionId = state.sessions[0] ? state.sessions[0].sessionId : null;
            if (!state.selectedSessionId) closeDrawer();
          }
        } catch (error) {
          state.error = (error && error.message) || t('deleteFailed');
        } finally {
          state.deletingSessionId = null;
          render();
        }
      }

      function updateSort(nextKey) {
        if (state.sortKey === nextKey) {
          state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = nextKey;
          state.sortDirection = nextKey === 'updatedAt' || nextKey === 'overallLength' ? 'desc' : 'asc';
        }
        render();
      }

      els.searchInput.addEventListener('input', (event) => {
        state.searchQuery = event.target.value;
        state.armedDeleteSessionId = null;
        render();
      });
      els.refreshButton.addEventListener('click', fetchSessions);
      els.retryButton.addEventListener('click', fetchSessions);
      els.toggleInspectorButton.addEventListener('click', () => {
        if (state.drawerOpen) closeDrawer(); else openDrawer();
      });
      els.closeDrawerButton.addEventListener('click', () => { state.armedDeleteSessionId = null; closeDrawer(); render(); });
      els.drawerBackdrop.addEventListener('click', () => { state.armedDeleteSessionId = null; closeDrawer(); render(); });
      els.langZh.addEventListener('click', () => { state.lang = 'zh'; try { localStorage.setItem('csm-lang', 'zh'); } catch (_) {} render(); });
      els.langEn.addEventListener('click', () => { state.lang = 'en'; try { localStorage.setItem('csm-lang', 'en'); } catch (_) {} render(); });
      els.sortButtons.forEach((button) => button.addEventListener('click', () => { state.armedDeleteSessionId = null; updateSort(button.getAttribute('data-sort-key')); }));
      els.sortChips.forEach((button) => button.addEventListener('click', () => { state.armedDeleteSessionId = null; updateSort(button.getAttribute('data-sort-chip')); }));
      document.addEventListener('click', (event) => {
        const deleteButton = event.target.closest('[data-delete-id]');
        if (!deleteButton && state.armedDeleteSessionId) {
          state.armedDeleteSessionId = null;
          render();
        }
      });

      // '/' focuses search; Escape blurs it
      document.addEventListener('keydown', (event) => {
        if (event.key === '/' && document.activeElement !== els.searchInput) {
          event.preventDefault();
          els.searchInput.focus();
          els.searchInput.select();
        }
        if (event.key === 'Escape' && document.activeElement === els.searchInput) {
          els.searchInput.blur();
        }
      });

      // ── Theme toggle ──────────────────────────────
      const themeToggleButton = document.getElementById('themeToggleButton');
      const themeIconMoon = document.getElementById('themeIconMoon');
      const themeIconSun  = document.getElementById('themeIconSun');

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        const isDark = theme === 'dark';
        themeIconMoon.style.display = isDark ? '' : 'none';
        themeIconSun.style.display  = isDark ? 'none' : '';
        themeToggleButton.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        try { localStorage.setItem('csm-theme', theme); } catch (_) {}
      }

      function initTheme() {
        let saved = null;
        try { saved = localStorage.getItem('csm-theme'); } catch (_) {}
        const preferred = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        applyTheme(preferred);
      }

      themeToggleButton.addEventListener('click', () => {
        const current = document.documentElement.dataset.theme || 'dark';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });

      initTheme();
      render();
      fetchSessions();
    })();
  </script>
</body>
</html>
