<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Session Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Mono+SC:wght@100..900&family=Noto+Sans+SC:wght@100..900&family=Noto+Serif+SC:wght@200..900&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-serif: 'Noto Serif SC', serif; --font-sans: 'Noto Sans SC', sans-serif; --font-mono: 'Noto Sans Mono SC', monospace;
      --ease: cubic-bezier(.16,1,.3,1); --dur: 200ms;
      --bg: #fdfdfc; --surface: #ffffff; --surface-2: #f5f5f4; --surface-hover: #f1f1ef; --surface-sel: #fffbeb;
      --text: #18181b; --text-2: #3f3f46; --text-3: #52525b; --text-4: #71717a;
      --accent: #ea580c; --accent-soft: rgba(234,88,12,0.06); --accent-line: rgba(234,88,12,0.25);
      --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
      --danger: #dc2626; --danger-soft: rgba(220,38,38,0.06); --danger-line: rgba(220,38,38,0.2);
      --success: #16a34a; --success-soft: rgba(22,163,74,0.06);
    }
    html[data-theme="dark"] {
      --bg: #020203; --surface: #0a0a0c; --surface-2: #121214; --surface-hover: #18181b; --surface-sel: #1c1912;
      --text: #e4e4e7; --text-2: #d4d4d8; --text-3: #a1a1aa; --text-4: #71717a;
      --accent: #fb923c; --accent-soft: rgba(251,146,60,0.08); --accent-line: rgba(251,146,60,0.3);
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.18);
      --danger: #f43f5e; --danger-soft: rgba(244,63,94,0.08); --danger-line: rgba(244,63,94,0.3);
      --success: #10b981; --success-soft: rgba(16,185,129,0.08);
    }
    @media (prefers-color-scheme: dark) {
      html[data-theme="system"] {
        --bg: #020203; --surface: #0a0a0c; --surface-2: #121214; --surface-hover: #18181b; --surface-sel: #1c1912;
        --text: #e4e4e7; --text-2: #d4d4d8; --text-3: #a1a1aa; --text-4: #71717a;
        --accent: #fb923c; --accent-soft: rgba(251,146,60,0.08); --accent-line: rgba(251,146,60,0.3);
        --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.18);
        --danger: #f43f5e; --danger-soft: rgba(244,63,94,0.08); --danger-line: rgba(244,63,94,0.3);
        --success: #10b981; --success-soft: rgba(16,185,129,0.08);
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
    .app { display: grid; grid-template-rows: auto auto 1fr; height: 100dvh; overflow: hidden; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; border-bottom: 1px solid var(--border-strong); background: var(--surface); }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .brand-mark { width: 18px; height: 18px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .brand-mark svg { width: 10px; height: 10px; fill: var(--bg); }
    .brand-title { font-family: var(--font-mono); font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; color: var(--text); display: flex; align-items: center; gap: 4px; }
    .brand-title::after { content: ''; width: 8px; height: 14px; background: var(--accent); display: inline-block; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .stats { display: flex; align-items: center; gap: 28px; font-size: 11px; color: var(--text-3); padding-left: 20px; border-left: 1px solid var(--border); font-family: var(--font-mono); }
    .stat { display: flex; align-items: baseline; gap: 8px; }
    .stat-label { font-weight: 800; text-transform: uppercase; font-size: 9px; color: var(--text-4); letter-spacing: 0.1em; }
    .stat-value { color: var(--text-2); font-weight: 600; font-size: 13px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .status { display: flex; align-items: center; gap: 10px; font-size: 10px; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); }
    .status-dot { width: 5px; height: 5px; background: var(--text-4); transition: background var(--dur); }
    .status-dot[data-ready="true"] { background: var(--success); box-shadow: 0 0 10px var(--success-soft); }
    .btn { display: inline-flex; align-items: center; gap: 8px; height: 32px; padding: 0 14px; border: 1px solid var(--border-strong); background: var(--surface-2); color: var(--text-2); font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all var(--dur); }
    .btn:hover { border-color: var(--text-2); background: var(--surface-hover); color: var(--text); }
    .btn-icon { width: 32px; padding: 0; justify-content: center; flex-shrink: 0; }
    .theme-cycle svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; display: none; }
    html[data-theme="system"] .theme-cycle .icon-system { display: block; }
    html[data-theme="light"] .theme-cycle .icon-light { display: block; }
    html[data-theme="dark"] .theme-cycle .icon-dark { display: block; }
    .toolbar { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 52px; border-bottom: 1px solid var(--border); background: var(--surface); }
    .toolbar-left { display: flex; align-items: center; gap: 24px; flex: 1; min-width: 0; }
    .search { position: relative; flex: 1; max-width: 400px; }
    .search svg { position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 14px; color: var(--text-4); pointer-events: none; }
    .search input { width: 100%; height: 32px; padding-left: 28px; border: none; background: transparent; color: var(--text); font-family: var(--font-mono); font-size: 13px; outline: none; }
    .sort { display: flex; align-items: center; gap: 4px; padding-left: 24px; border-left: 1px solid var(--border); }
    .sort-label { font-size: 9px; font-weight: 800; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.1em; font-family: var(--font-mono); }
    .sort-chip { height: 24px; padding: 0 10px; background: transparent; color: var(--text-3); font-size: 11px; font-family: var(--font-mono); cursor: pointer; border: 1px solid transparent; transition: all var(--dur); }
    .sort-chip[data-active="true"] { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
    .panel { position: relative; overflow: hidden; min-height: 0; }
    .scroll { height: 100%; overflow: auto; scroll-behavior: smooth; }
    .scroll::-webkit-scrollbar { width: 4px; height: 4px; }
    .scroll::-webkit-scrollbar-thumb { background: var(--border-strong); }
    .session { display: grid; grid-template-columns: 1fr auto; gap: 32px; padding: 20px 24px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 150ms; }
    .session[data-animate="true"] { animation: slideIn 0.4s var(--ease) both; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .session:hover { background: var(--surface-hover); }
    .session[data-selected="true"] { background: var(--surface-sel); border-left: 4px solid var(--accent); padding-left: 20px; }
    .session-main { min-width: 0; display: flex; flex-direction: column; gap: 10px; }
    .session-head { display: flex; align-items: baseline; gap: 14px; min-width: 0; }
    .session-title { font-family: var(--font-serif); font-size: 17px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 500px; }
    .session-badge { font-family: var(--font-mono); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; padding: 1px 6px; background: var(--surface-2); color: var(--text-4); border: 1px solid var(--border-strong); flex-shrink: 0; }
    .session-badge.ai { color: var(--accent); border-color: var(--accent-line); }
    .session-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-2); font-family: var(--font-mono); }
    .session-meta .path { color: var(--text); font-weight: 500; }
    .session-preview-group { display: flex; flex-direction: column; gap: 2px; }
    .session-preview { font-size: 12px; color: var(--text-3); font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; line-height: 1.4; opacity: 0.85; }
    .session-preview:last-child { color: var(--text-4); }
    
    /* Search Highlighting */
    mark { background: var(--accent); color: var(--bg); padding: 0 2px; }

    .session-side { display: flex; align-items: center; gap: 24px; }
    .session-stats { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 90px; font-family: var(--font-mono); }
    .session-length { font-size: 11px; font-weight: 800; color: var(--text-2); text-transform: uppercase; }
    .session-size { font-size: 10px; color: var(--text-4); }
    .act-delete { 
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 80px; height: 28px; padding: 0 12px; 
      background: var(--surface-2); border: 1px solid var(--border-strong); 
      color: var(--text-3); font-family: var(--font-mono); font-size: 10px; 
      font-weight: 700; text-transform: uppercase; cursor: pointer; 
      transition: all var(--dur); 
    }
    .act-delete:hover { color: var(--danger); border-color: var(--danger-line); background: var(--danger-soft); }
    .act-delete[data-armed="true"] { background: var(--danger); color: #fff; border-color: var(--danger); }
    .drawer { position: fixed; top: 0; right: 0; bottom: 0; width: 560px; max-width: 90vw; background: var(--bg); border-left: 1px solid var(--border-strong); transform: translateX(100%); transition: transform 350ms var(--ease); z-index: 100; display: flex; flex-direction: column; box-shadow: none; }
    .drawer[data-open="true"] { transform: translateX(0); }
    .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.6); opacity: 0; pointer-events: none; transition: opacity 300ms; z-index: 90; }
    .backdrop[data-open="true"] { opacity: 1; pointer-events: auto; }
    .drawer-head { padding: 40px 40px 30px; border-bottom: 1px solid var(--border-strong); position: relative; }
    .drawer-close { position: absolute; top: 32px; right: 32px; z-index: 10; cursor: pointer; background: none; border: none; color: var(--text-4); }
    .drawer-close:hover { color: var(--text); }
    .drawer-close svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .drawer-eyebrow { font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 12px; font-family: var(--font-mono); }
    .drawer-title { font-family: var(--font-serif); font-size: 26px; font-weight: 700; color: var(--text); line-height: 1.2; padding-right: 40px; }
    .drawer-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding: 24px 40px; background: var(--surface); border-bottom: 1px solid var(--border-strong); font-family: var(--font-mono); }
    .metric-label { font-size: 9px; font-weight: 800; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
    .metric-value { font-size: 14px; font-weight: 600; color: var(--text-2); }
    .drawer-body { flex: 1; overflow-y: auto; padding-bottom: 40px; }
    .md-section { padding: 32px 40px; border-bottom: 1px solid var(--border); }
    .md-section h3 { font-family: var(--font-mono); font-size: 9px; font-weight: 800; color: var(--text-4); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 20px; }
    .md-block { font-size: 14px; line-height: 1.8; color: var(--text-2); }
    .md-block code { font-family: var(--font-mono); background: var(--surface-2); padding: 2px 6px; color: var(--accent); border: 1px solid var(--border); }
    .md-block pre { background: var(--surface); padding: 24px; border: 1px solid var(--border-strong); margin: 20px 0; overflow-x: auto; }
    .md-block blockquote { border-left: 2px solid var(--accent); padding-left: 24px; margin: 24px 0; font-style: italic; color: var(--text-3); }
    .state { position: absolute; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 20; }
    .state[data-visible="false"] { display: none; }
    .state-card { text-align: center; padding: 60px; border: 1px solid var(--border-strong); font-family: var(--font-mono); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); animation: spin 0.6s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 1000px) { .drawer { width: 100%; max-width: 100%; } }
    @media (max-width: 640px) { .topbar { padding: 0 16px; } .stats { display: none; } .toolbar { height: auto; padding: 12px 16px; flex-direction: column; gap: 12px; } .toolbar-left { flex-direction: column; width: 100%; } .session { padding: 20px 16px; grid-template-columns: 1fr; } .session-side { justify-content: space-between; } }
  </style>
</head>
<body data-theme="system">
  <div class="backdrop" id="drawerBackdrop"></div>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"><svg viewBox="0 0 16 16"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z"/></svg></div>
        <div class="brand-title">Claude Session Manager</div>
        <div class="stats">
          <div class="stat"><span class="stat-label" id="statVisibleLabel"></span><span class="stat-value" id="statVisible">—</span></div>
          <div class="stat"><span class="stat-label" id="statProjectsLabel"></span><span class="stat-value" id="statProjects">—</span></div>
          <div class="stat"><span class="stat-label" id="statLongestLabel"></span><span class="stat-value" id="statLongest">—</span></div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="status"><div class="status-dot" id="statusDot"></div><div id="lastUpdatedLabel">—</div></div>
        <button class="btn" id="langToggleBtn" type="button"></button>
        <button class="btn btn-icon theme-cycle" id="themeCycleBtn">
          <svg class="icon-system" viewBox="0 0 24 24"><rect width="16" height="10" x="4" y="5" rx="2"></rect><path d="M12 15v4"></path><path d="M9 20h6"></path></svg>
          <svg class="icon-light" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
          <svg class="icon-dark" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
        </button>
      </div>
    </header>
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7.5"/><path d="m19.5 19.5-4-4"/></svg><input id="searchInput" type="search" autocomplete="off" spellcheck="false"></div>
        <div class="sort" id="sortBar">
          <span class="sort-label" id="sortLabel"></span>
          <button class="sort-chip" type="button" data-sort-chip="updatedAt"></button>
          <button class="sort-chip" type="button" data-sort-chip="title"></button>
          <button class="sort-chip" type="button" data-sort-chip="projectPath"></button>
          <button class="sort-chip" type="button" data-sort-chip="overallLength"></button>
        </div>
      </div>
      <div class="toolbar-right"><button class="btn" id="refreshButton" type="button"></button><button class="btn" id="toggleInspectorButton" type="button"></button></div>
    </div>
    <div class="panel">
      <div class="scroll"><ul class="session-list" id="sessionsBody"></ul></div>
      <div class="state" id="loadingState" data-visible="false"><div class="state-card"><div class="spinner"></div><p id="loadingTitle"></p></div></div>
      <div class="state" id="emptyState" data-visible="false"><div class="state-card"><p id="emptyTitle"></p></div></div>
    </div>
  </main>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <button class="btn btn-icon drawer-close" id="closeDrawerBtn"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      <div class="drawer-eyebrow" id="drawerEyebrow"></div>
      <div class="drawer-title" id="drawerTitle"></div>
    </div>
    <div class="drawer-metrics">
      <div class="metric"><div class="metric-label" id="metricLengthLabel"></div><div class="metric-value" id="metricLengthValue"></div></div>
      <div class="metric"><div class="metric-label" id="metricStorageLabel"></div><div class="metric-value" id="metricStorageValue"></div></div>
      <div class="metric"><div class="metric-label" id="metricCreatedLabel"></div><div class="metric-value" id="metricCreatedValue"></div></div>
      <div class="metric"><div class="metric-label" id="metricUpdatedLabel"></div><div class="metric-value" id="metricUpdatedValue"></div></div>
    </div>
    <div class="drawer-body" id="drawerScroll"></div>
  </aside>

  <script>
    (() => {
      const I18N = {
        zh: {
          langToggle: '中 / EN', statVisible: '会话', statProjects: '项目', statLongest: '最长',
          searchPlaceholder: '搜索标题、路径或内容...', refresh: '刷新', toggleInspector: '详情', sortLabel: '排序',
          sortRecent: '最近', sortTitle: '标题', sortProject: '项目', sortLength: '长度',
          loadingTitle: '正在同步...', emptyNone: '无记录', statusReady: '已同步', drawerEyebrow: 'Session Details',
          metricLength: '总条目', metricStorage: '占用空间', metricCreated: '创建时间', metricUpdated: '最近更新',
          projectPath: '项目路径', firstPrompt: '初始 Prompt', delete: '删除', deleteArmed: '确定', untitledSession: '未命名', unitEntry: '条'
        },
        en: {
          langToggle: 'EN / 中', statVisible: 'Sessions', statProjects: 'Projects', statLongest: 'Longest',
          searchPlaceholder: 'Search...', refresh: 'Refresh', toggleInspector: 'Details', sortLabel: 'Sort',
          sortRecent: 'Recent', sortTitle: 'Title', sortProject: 'Project', sortLength: 'Length',
          loadingTitle: 'Syncing...', emptyNone: 'No data', statusReady: 'Synced', drawerEyebrow: 'Session Details',
          metricLength: 'Total Entries', metricStorage: 'Size', metricCreated: 'Born', metricUpdated: 'Updated',
          projectPath: 'Path', firstPrompt: 'Initial Prompt', delete: 'DELETE', deleteArmed: 'CONFIRM', untitledSession: 'Untitled', unitEntry: 'Entries'
        }
      };
      
      const state = { 
        sessions: [], filteredSessions: [], searchQuery: '', 
        sortKey: 'updatedAt', sortDirection: 'desc', 
        selectedRecordId: null, drawerOpen: false, loading: true, isInitialLoad: true, 
        armedDeleteRecordId: null, lang: localStorage.getItem('csm-lang') || 'zh', 
        theme: localStorage.getItem('csm-theme') || 'system' 
      };

      const els = { sessionsBody: document.getElementById('sessionsBody'), searchInput: document.getElementById('searchInput'), drawer: document.getElementById('drawer'), drawerBackdrop: document.getElementById('drawerBackdrop'), langToggleBtn: document.getElementById('langToggleBtn'), themeCycleBtn: document.getElementById('themeCycleBtn') };
      const t = (k) => I18N[state.lang][k] || k;

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes <= 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let i = 0, v = bytes;
        while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
        return v.toFixed(v < 10 && i > 0 ? 1 : 0) + ' ' + units[i];
      }

      function formatRelative(value) {
        if (!value) return '—';
        const d = new Date(value);
        const diff = (Date.now() - d.getTime()) / 1000;
        if (diff < 60) return state.lang === 'zh' ? '刚刚' : 'Just now';
        if (diff < 3600) return Math.floor(diff/60) + (state.lang === 'zh' ? '分钟前' : 'm ago');
        if (diff < 86400) return Math.floor(diff/3600) + (state.lang === 'zh' ? '小时前' : 'h ago');
        if (diff < 2592000) return Math.floor(diff/86400) + (state.lang === 'zh' ? '天前' : 'd ago');
        return d.toLocaleDateString();
      }

      function highlight(text) {
        if (!state.searchQuery || !text) return text;
        const q = state.searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        return text.replace(new RegExp(q, 'gi'), (m) => `<mark>${m}</mark>`);
      }

      function render() {
        document.documentElement.dataset.theme = state.theme;
        els.langToggleBtn.textContent = t('langToggle');

        document.getElementById('statVisibleLabel').textContent = t('statVisible');
        document.getElementById('statProjectsLabel').textContent = t('statProjects');
        document.getElementById('statLongestLabel').textContent = t('statLongest');
        els.searchInput.placeholder = t('searchPlaceholder');
        document.getElementById('refreshButton').textContent = t('refresh');
        document.getElementById('toggleInspectorButton').textContent = state.drawerOpen ? 'CLOSE' : t('toggleInspector');
        document.getElementById('sortLabel').textContent = t('sortLabel');
        document.getElementById('loadingTitle').textContent = t('loadingTitle');
        document.getElementById('emptyTitle').textContent = t('emptyNone');
        document.getElementById('drawerEyebrow').textContent = t('drawerEyebrow');
        document.getElementById('metricLengthLabel').textContent = t('metricLength');
        document.getElementById('metricStorageLabel').textContent = t('metricStorage');
        document.getElementById('metricCreatedLabel').textContent = t('metricCreated');
        document.getElementById('metricUpdatedLabel').textContent = t('metricUpdated');
        document.getElementById('statVisible').textContent = state.filteredSessions.length;
        document.getElementById('statProjects').textContent = new Set(state.filteredSessions.map(s => s.projectPath)).size;
        document.getElementById('statLongest').textContent = Math.max(0, ...state.filteredSessions.map(s => s.overallLength || 0));

        Array.from(document.querySelectorAll('[data-sort-chip]')).forEach(chip => {
          const key = chip.dataset.sortChip;
          chip.dataset.active = state.sortKey === key;
          const label = key === 'updatedAt' ? t('sortRecent') : key === 'title' ? t('sortTitle') : key === 'projectPath' ? t('sortProject') : t('sortLength');
          chip.textContent = label + (state.sortKey === key ? (state.sortDirection === 'asc' ? ' ↑' : ' ↓') : '');
        });

        els.sessionsBody.innerHTML = '';
        state.filteredSessions.forEach((s, i) => {
          const li = document.createElement('li');
          li.className = 'session';
          li.dataset.selected = s.recordId === state.selectedRecordId;
          if (state.isInitialLoad) { li.dataset.animate = 'true'; li.style.animationDelay = (i * 25) + 'ms'; }
          const delArmed = state.armedDeleteRecordId === s.recordId;
          
          let previewHtml = `<div class="session-preview">${highlight(s.firstPrompt || '—')}</div>`;
          if (s.lastPrompt && s.lastPrompt !== s.firstPrompt) {
            previewHtml += `<div class="session-preview">${highlight(s.lastPrompt)}</div>`;
          }

          li.innerHTML = `
            <div class="session-main">
              <div class="session-head"><span class="session-title">${highlight(s.title || t('untitledSession'))}</span><span class="session-badge ${s.titleKind==='explicit'?'ai':''}">${s.titleKind==='explicit'?'AI':'DEF'}</span></div>
              <div class="session-meta">
                <span class="path">${highlight(s.projectPath||'—')}</span>
                <span>·</span>
                <span>${formatRelative(s.updatedAt)}</span>
              </div>
              <div class="session-preview-group">${previewHtml}</div>
            </div>
            <div class="session-side">
              <div class="session-stats"><span class="session-length">${s.overallLength} ${t('unitEntry')}</span><span class="session-size">${formatBytes(s.totalStorageBytes)}</span></div>
              <button class="act-delete" data-delete-id="${s.recordId}" data-armed="${delArmed}">${delArmed ? t('deleteArmed') : t('delete')}</button>
            </div>
          `;
          li.onclick = (e) => { if (e.target.closest('[data-delete-id]')) return; state.selectedRecordId = s.recordId; state.drawerOpen = true; render(); };
          li.querySelector('[data-delete-id]').onclick = (e) => { e.stopPropagation(); if (state.armedDeleteRecordId !== s.recordId) { state.armedDeleteRecordId = s.recordId; render(); } else { deleteSession(s); } };
          els.sessionsBody.appendChild(li);
        });

        els.drawer.dataset.open = state.drawerOpen;
        els.drawerBackdrop.dataset.open = state.drawerOpen;
        const selected = state.sessions.find(s => s.recordId === state.selectedRecordId);
        if (selected) {
          document.getElementById('drawerTitle').textContent = selected.title;
          document.getElementById('metricLengthValue').textContent = selected.overallLength + ' ' + t('unitEntry');
          document.getElementById('metricStorageValue').textContent = formatBytes(selected.totalStorageBytes);
          document.getElementById('metricCreatedValue').textContent = new Date(selected.startedAt).toLocaleString();
          document.getElementById('metricUpdatedValue').textContent = new Date(selected.updatedAt).toLocaleString();
          document.getElementById('drawerScroll').innerHTML = `<div class="md-section"><h3>${t('projectPath')}</h3><div class="md-block"><code>${selected.projectPath}</code></div></div><div class="md-section"><h3>${t('firstPrompt')}</h3><div class="md-block"><p>${selected.firstPrompt||'—'}</p></div></div>`;
        }
        document.getElementById('loadingState').dataset.visible = state.loading;
        document.getElementById('statusDot').dataset.ready = !state.loading;
        document.getElementById('lastUpdatedLabel').textContent = state.loading ? '...' : formatRelative(state.lastFetchedAt);
      }

      async function fetchSessions() {
        state.loading = true; state.isInitialLoad = true; render();
        try {
          const r = await fetch('/api/sessions');
          const data = await r.json();
          const list = Array.isArray(data) ? data : data.sessions;
          state.sessions = list.map((s, i) => ({ ...s, recordId: s.recordId || `rec-${i}`, overallLength: (s.userMessageCount || 0) + (s.assistantMessageCount || 0), totalStorageBytes: (s.storageBytes || 0) + (s.sessionDirStorageBytes || 0) + (s.subagentStorageBytes || 0), titleKind: s.titleSource && s.titleSource.includes('ai') ? 'explicit' : 'derived' }));
          state.lastFetchedAt = new Date().toISOString();
          applyFilters();
        } catch (e) { console.error(e); }
        state.loading = false; render();
        setTimeout(() => { state.isInitialLoad = false; }, 500);
      }
      function applyFilters() {
        const q = state.searchQuery.toLowerCase();
        let res = q ? state.sessions.filter(s => (s.title + s.projectPath + s.firstPrompt + s.lastPrompt).toLowerCase().includes(q)) : [...state.sessions];
        const m = state.sortDirection === 'asc' ? 1 : -1;
        res.sort((a, b) => { if (state.sortKey === 'overallLength') return (a.overallLength - b.overallLength) * m; return (a[state.sortKey] || '').toString().localeCompare((b[state.sortKey] || '').toString()) * m; });
        state.filteredSessions = res;
      }
      async function deleteSession(s) { try { await fetch(`/api/sessions/${encodeURIComponent(s.sessionId)}`, { method: 'DELETE' }); state.sessions = state.sessions.filter(x => x.recordId !== s.recordId); applyFilters(); } catch (e) { alert(e); } state.armedDeleteRecordId = null; render(); }
      els.searchInput.oninput = (e) => { state.searchQuery = e.target.value; applyFilters(); render(); };
      document.getElementById('refreshButton').onclick = fetchSessions;
      document.querySelectorAll('[data-sort-chip]').forEach(c => c.onclick = () => { if (state.sortKey === c.dataset.sortChip) state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc'; else { state.sortKey = c.dataset.sortChip; state.sortDirection = 'desc'; } applyFilters(); render(); });
      els.langToggleBtn.onclick = () => { state.lang = state.lang === 'zh' ? 'en' : 'zh'; localStorage.setItem('csm-lang', state.lang); render(); };
      els.themeCycleBtn.onclick = () => { const order = ['system', 'light', 'dark']; state.theme = order[(order.indexOf(state.theme) + 1) % 3]; localStorage.setItem('csm-theme', state.theme); render(); };
      els.drawerBackdrop.onclick = document.getElementById('closeDrawerBtn').onclick = () => { state.drawerOpen = false; render(); };
      document.getElementById('toggleInspectorButton').onclick = () => { state.drawerOpen = !state.drawerOpen; render(); };
      window.onkeydown = (e) => { if (e.key === 'Escape' && state.drawerOpen) { state.drawerOpen = false; render(); } };
      fetchSessions();
    })();
  </script>
</body>
</html>
