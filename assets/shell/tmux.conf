# Linux Setup tmux config

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g mouse on
set -g history-limit 100000
set -g escape-time 10
set -g focus-events on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind '|' split-window -h -c "#{pane_current_path}"
bind '-' split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235] "
set -g status-left-length 30
set -g status-right "#[fg=colour248] %m-%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W "

set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
